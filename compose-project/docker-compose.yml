version: '3.8'

services:
  # Сервис №1: Наш веб-сайт
  web-server:
    image: nginx:alpine
    ports:
      - "8081:80"

  # Сервис №2: Утилита Dozzle (показывает логи контейнеров в красивом веб-интерфейсе)
  logs-monitor:
    image: amir20/dozzle:latest
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
